<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: pointer;
        }

        .container {
            position: relative;
            z-index: 0;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
            pointer-events: none;
        }

        h1 {
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 1s ease;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2em;
            color: #888;
            margin-bottom: 60px;
            animation: fadeIn 1.5s ease;
        }

        .project-card {
            position: fixed;
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 212, 255, 0.5);
            max-width: 500px;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            box-shadow: 0 30px 80px rgba(0, 212, 255, 0.4);
        }

        .project-card.show {
            opacity: 1;
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.5);
            transform: rotate(90deg);
        }

        .project-icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
            text-align: center;
        }

        .project-title {
            font-size: 2em;
            margin-bottom: 15px;
            color: #00d4ff;
            text-align: center;
        }

        .project-description {
            color: #ccc;
            line-height: 1.8;
            margin-bottom: 25px;
            text-align: center;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tech-tag {
            background: rgba(123, 47, 247, 0.3);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            border: 1px solid rgba(123, 47, 247, 0.6);
        }

        .project-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .project-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .source-link {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
        }

        .source-link:hover {
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }

        .project-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .recommendation-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            animation: pulse 2s infinite;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .neural-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 0.75em;
            z-index: 1000;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulseIndicator 2s infinite;
        }

        @keyframes pulseIndicator {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 50, 0.9);
            padding: 30px 50px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 1.3em;
            z-index: 999;
            text-align: center;
            animation: fadeIn 1.5s ease;
            pointer-events: none;
        }

        .stats-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.9);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 0.75em;
            z-index: 1000;
            min-width: 180px;
        }

        .stats-title {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            padding: 3px 0;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.85em;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 0.85em;
        }

        .recommended-tag {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <canvas id="neuralCanvas"></canvas>
    
    <div class="container">
        <h1>Mi Portfolio</h1>
        <p class="subtitle">La red aprende de tus intereses 🧠</p>
    </div>

    <div class="instruction">
        ✨ Explora los nodos - La IA aprenderá tus preferencias ✨
    </div>

    <div class="stats-panel" id="statsPanel">
        <div class="stats-title">Navegación</div>
        <div class="stat-item">
            <span class="stat-label">Vistos:</span>
            <span class="stat-value" id="viewCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Favorita:</span>
            <span class="stat-value" id="favCategory">-</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Precisión:</span>
            <span class="stat-value" id="accuracy">0%</span>
        </div>
    </div>

    <div id="cardContainer"></div>

    <div class="neural-indicator">
        <span class="pulse"></span>
        Red Adaptativa
    </div>

    <script>
        // Configuración de proyectos con categorías
        const projects = [
            {
                icon: '🚀',
                title: 'Quadratic Equation Solver',
                description: 'Calculadora para resolver ecuaciones cuadráticas.',
                tech: ['JavaScript'],
                link: 'quadratic_equation',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/quadratic_equation',
                category: 'maths',
                tags: ['math', 'calculator']
            },
            {
                icon: '🤖',
                title: 'Random Questions',
                description: 'Generador de preguntas aleatorias.',
                tech: ['JavaScript'],
                link: 'random_questions',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/random_questions',
                category: 'tools',
                tags: ['questions']
            },
            {
                icon: '🌐',
                title: 'Subnetting Solver',
                description: 'Herramienta para resolver calculos de subnetting en redes.',
                tech: ['JavaScript'],
                link: 'subnetting',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/subnetting',
                category: 'networking',
                tags: ['networking', 'subnetting']
            },
            {
                icon: '🌐',
                title: 'Order Handler Basic',
                description: 'Sistema básico de gestión de órdenes para pequeñas empresas.',
                tech: ['Javascript'],
                link: 'https://www.youtube.com/watch?v=ZpAm2uVOonk',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/order_handler',
                category: 'tools',
                tags: ['orders', 'management']
            },
            {
                icon: '📊',
                title: 'Sierpinski Triangle Visualizer',
                description: 'Visualizador del Triángulo de Sierpinski.',
                tech: ['JavaScript'],
                link: 'sierpinski_triangle',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/sierpinski_triangle',
                category: 'maths',
                tags: ['maths', 'visualization']
            },
            {
                icon: '🎮',
                title: 'Conway Game Life',
                description: 'Simulación del Juego de la Vida de Conway.',
                tech: ['JavaScript'],
                link: 'conway_game_life',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/conway_game_life',
                category: 'gamedev',
                tags: ['games', 'simulation']
            },
            {
                icon: '🎮',
                title: 'Word Search',
                description: 'Juego de Sopa de Letras interactivo con sistema de puntuación.',
                tech: ['JavaScript'],
                link: 'word_search',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/word_search',
                category: 'gamedev',
                tags: ['games', 'words']
            },
            {
                icon: '🌐',
                title: 'Chat App',
                description: 'Aplicación de chat en tiempo real utilizando patrones de diseño.',
                tech: ['Java'],
                link: 'https://www.youtube.com/watch?v=H1CKDsu1qzc',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/chat',
                category: 'networking',
                tags: ['chat', 'realtime']
            },
            {
                icon: '📊',
                title: 'Frequency table with intervals',
                description: 'Visualizador del Histograma de Sturges.',
                tech: ['Java'],
                link: 'https://www.youtube.com/watch?v=CuKr7GzohbI',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/sturges',
                category: 'maths',
                tags: ['sturges', 'realtime']
            },
            {
                icon: '🎮',
                title: 'Slot Machine',
                description: 'Máquina tragamonedas desarrollada en VB.net.',
                tech: ['VB.net'],
                link: 'https://www.youtube.com/watch?v=y-ej4NihREs',
                source: 'https://github.com/creationexus/creationexus.github.io/tree/main/slot_machine',
                category: 'gamedev',
                tags: ['slot-machine', 'game']
            }
        ];

        // Red Neuronal con Aprendizaje
        class AdaptiveNeuralNetwork {
            constructor(nodeCount) {
                this.nodeCount = nodeCount;
                this.weights = Array(nodeCount).fill(0).map(() => 
                    Array(nodeCount).fill(0).map(() => Math.random() * 0.5)
                );
                this.viewHistory = [];
                this.categoryPreferences = {};
                this.recommendations = Array(nodeCount).fill(0);
                this.learningRate = 0.1;
            }

            recordView(nodeIndex, timeSpent) {
                const project = projects[nodeIndex];
                this.viewHistory.push({
                    index: nodeIndex,
                    category: project.category,
                    tags: project.tags,
                    timestamp: Date.now(),
                    timeSpent: timeSpent
                });

                // Actualizar preferencias de categoría
                if (!this.categoryPreferences[project.category]) {
                    this.categoryPreferences[project.category] = 0;
                }
                this.categoryPreferences[project.category] += timeSpent / 1000;

                // Aprendizaje: fortalecer conexiones
                this.learn(nodeIndex);
                this.updateRecommendations();
            }

            learn(viewedIndex) {
                // Fortalecer conexiones con proyectos similares
                projects.forEach((project, i) => {
                    if (i !== viewedIndex) {
                        const similarity = this.calculateSimilarity(viewedIndex, i);
                        this.weights[viewedIndex][i] += similarity * this.learningRate;
                        this.weights[i][viewedIndex] += similarity * this.learningRate;
                        
                        // Normalizar pesos
                        this.weights[viewedIndex][i] = Math.min(1, this.weights[viewedIndex][i]);
                        this.weights[i][viewedIndex] = Math.min(1, this.weights[i][viewedIndex]);
                    }
                });
            }

            calculateSimilarity(index1, index2) {
                const p1 = projects[index1];
                const p2 = projects[index2];
                
                let similarity = 0;
                
                // Misma categoría
                if (p1.category === p2.category) {
                    similarity += 0.5;
                }
                
                // Tags compartidos
                const sharedTags = p1.tags.filter(tag => p2.tags.includes(tag));
                similarity += sharedTags.length * 0.2;
                
                return Math.min(1, similarity);
            }

            updateRecommendations() {
                if (this.viewHistory.length === 0) {
                    this.recommendations = Array(this.nodeCount).fill(0);
                    return;
                }

                // Calcular scores de recomendación
                projects.forEach((project, i) => {
                    let score = 0;
                    
                    // Score basado en historial
                    this.viewHistory.forEach(view => {
                        score += this.weights[view.index][i] * (view.timeSpent / 5000);
                    });

                    // Bonus por categoría favorita
                    const favCategory = this.getFavoriteCategory();
                    if (project.category === favCategory) {
                        score += 0.3;
                    }

                    // Penalización si ya fue visto
                    const wasViewed = this.viewHistory.some(v => v.index === i);
                    if (wasViewed) {
                        score *= 0.3;
                    }

                    this.recommendations[i] = Math.min(1, score);
                });
            }

            getTopRecommendations(n = 2) {
                return this.recommendations
                    .map((score, index) => ({ index, score }))
                    .sort((a, b) => b.score - a.score)
                    .slice(0, n)
                    .filter(r => r.score > 0.2);
            }

            getFavoriteCategory() {
                if (Object.keys(this.categoryPreferences).length === 0) return null;
                return Object.entries(this.categoryPreferences)
                    .sort((a, b) => b[1] - a[1])[0][0];
            }

            getAccuracy() {
                if (this.viewHistory.length < 2) return 0;
                const lastViews = this.viewHistory.slice(-3);
                const categories = lastViews.map(v => projects[v.index].category);
                const unique = new Set(categories).size;
                return Math.round((1 - (unique - 1) / categories.length) * 100);
            }
        }

        // Canvas setup
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const nn = new AdaptiveNeuralNetwork(projects.length);
        const nodes = [];
        let activeCard = null;
        let viewStartTime = null;

        // Crear nodos
        for (let i = 0; i < projects.length; i++) {
            const angle = (i / projects.length) * Math.PI * 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.25;
            nodes.push({
                x: canvas.width / 2 + Math.cos(angle) * radius,
                y: canvas.height / 2 + Math.sin(angle) * radius,
                baseX: canvas.width / 2 + Math.cos(angle) * radius,
                baseY: canvas.height / 2 + Math.sin(angle) * radius,
                project: projects[i],
                index: i,
                hovered: false
            });
        }

        // Ocultar instrucción
        setTimeout(() => {
            const instruction = document.querySelector('.instruction');
            if (instruction) {
                instruction.style.opacity = '0';
                setTimeout(() => instruction.remove(), 500);
            }
        }, 4000);

        function updateStats() {
            document.getElementById('viewCount').textContent = nn.viewHistory.length;
            
            const favCat = nn.getFavoriteCategory();
            document.getElementById('favCategory').textContent = 
                favCat ? favCat.toUpperCase() : '-';
            
            document.getElementById('accuracy').textContent = nn.getAccuracy() + '%';
        }

        function drawNeural() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const time = Date.now() * 0.001;
            const recommendations = nn.getTopRecommendations();

            // Dibujar conexiones con intensidad basada en pesos
            nodes.forEach((node, i) => {
                nodes.forEach((other, j) => {
                    if (i < j) {
                        const weight = nn.weights[i][j];
                        const dx = other.x - node.x;
                        const dy = other.y - node.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (weight > 0.1 || dist < 300) {
                            ctx.beginPath();
                            ctx.moveTo(node.x, node.y);
                            ctx.lineTo(other.x, other.y);
                            const opacity = Math.max(weight * 0.5, 0.1 * (1 - dist / 300));
                            ctx.strokeStyle = `rgba(123, 47, 247, ${opacity})`;
                            ctx.lineWidth = 1 + weight * 3;
                            ctx.stroke();
                        }
                    }
                });
            });

            // Actualizar y dibujar nodos
            nodes.forEach((node, i) => {
                const offsetX = Math.sin(time * 0.5 + i) * 20;
                const offsetY = Math.cos(time * 0.3 + i) * 20;
                node.x = node.baseX + offsetX;
                node.y = node.baseY + offsetY;

                const isRecommended = recommendations.some(r => r.index === i);
                const recScore = recommendations.find(r => r.index === i)?.score || 0;
                
                let size = 25;
                if (node.hovered) {
                    size = 40;
                } else if (isRecommended) {
                    size = 30 + recScore * 10 + Math.sin(time * 3) * 3;
                }

                // Dibujar nodo
                ctx.beginPath();
                ctx.arc(node.x, node.y, size, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, size);
                if (isRecommended) {
                    gradient.addColorStop(0, `rgba(255, 107, 107, 1)`);
                    gradient.addColorStop(1, `rgba(254, 202, 87, 0.8)`);
                } else {
                    gradient.addColorStop(0, `rgba(0, 212, 255, 0.9)`);
                    gradient.addColorStop(1, `rgba(123, 47, 247, 0.6)`);
                }
                ctx.fillStyle = gradient;
                ctx.fill();

                // Brillo para recomendados
                if (isRecommended) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 107, 107, ${0.5 + Math.sin(time * 3) * 0.3})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                // Texto del título
                const fontSize = node.hovered ? 14 : 9;
                ctx.font = `${fontSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(node.project.title, node.x, node.y);
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(drawNeural);
        }

        drawNeural();

        // Detectar clics
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            nodes.forEach(node => {
                const dx = mouseX - node.x;
                const dy = mouseY - node.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 40) {
                    showProjectCard(node.project, node.index, e.clientX, e.clientY);
                }
            });
        });

        // Detectar hover
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let hovering = false;
            nodes.forEach(node => {
                const dx = mouseX - node.x;
                const dy = mouseY - node.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                node.hovered = dist < 40;
                if (node.hovered) hovering = true;
            });

            canvas.style.cursor = hovering ? 'pointer' : 'default';
        });

        // Mostrar tarjeta
        function showProjectCard(project, index, x, y) {
            if (activeCard) {
                const timeSpent = Date.now() - viewStartTime;
                const prevIndex = parseInt(activeCard.dataset.index);
                nn.recordView(prevIndex, timeSpent);
                updateStats();
                activeCard.remove();
            }

            viewStartTime = Date.now();

            const card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.index = index;
            
            let posX = x - 250;
            let posY = y - 200;
            
            if (posX < 20) posX = 20;
            if (posX > window.innerWidth - 520) posX = window.innerWidth - 520;
            if (posY < 20) posY = 20;
            if (posY > window.innerHeight - 420) posY = window.innerHeight - 420;
            
            card.style.left = posX + 'px';
            card.style.top = posY + 'px';

            const isRecommended = nn.getTopRecommendations().some(r => r.index === index);

            card.innerHTML = `
                <button class="close-btn">×</button>
                ${isRecommended ? '<div class="recommendation-badge">⭐ Recomendado para ti</div>' : ''}
                <span class="project-icon">${project.icon}</span>
                <h3 class="project-title">${project.title}</h3>
                <p class="project-description">${project.description}</p>
                <div class="project-tech">
                    ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                </div>
                <div class="project-links">
                    <a href="${project.link}" target="_blank" class="project-link">Ver Demo →</a>
                    <a href="${project.source}" target="_blank" class="project-link source-link">📁 Código</a>
                </div>
            `;

            document.getElementById('cardContainer').appendChild(card);
            activeCard = card;

            setTimeout(() => card.classList.add('show'), 10);

            card.querySelector('.close-btn').addEventListener('click', () => {
                const timeSpent = Date.now() - viewStartTime;
                nn.recordView(index, timeSpent);
                updateStats();
                card.classList.remove('show');
                setTimeout(() => {
                    card.remove();
                    activeCard = null;
                }, 400);
            });
        }

        // Cerrar tarjeta al hacer clic fuera
        document.addEventListener('click', (e) => {
            if (activeCard && !activeCard.contains(e.target) && e.target === canvas) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                let clickedNode = false;
                nodes.forEach(node => {
                    const dx = mouseX - node.x;
                    const dy = mouseY - node.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 30) clickedNode = true;
                });

                if (!clickedNode) {
                    const timeSpent = Date.now() - viewStartTime;
                    const prevIndex = parseInt(activeCard.dataset.index);
                    nn.recordView(prevIndex, timeSpent);
                    updateStats();
                    activeCard.classList.remove('show');
                    setTimeout(() => {
                        activeCard.remove();
                        activeCard = null;
                    }, 400);
                }
            }
        });

        // Responsive
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            nodes.forEach((node, i) => {
                const angle = (i / nodes.length) * Math.PI * 2;
                const radius = Math.min(canvas.width, canvas.height) * 0.25;
                node.baseX = canvas.width / 2 + Math.cos(angle) * radius;
                node.baseY = canvas.height / 2 + Math.sin(angle) * radius;
            });
        });
    </script>
</body>
</html>
